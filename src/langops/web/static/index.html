<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangOps — 智能运维平台</title>
  <link rel="stylesheet" href="/ui/static/css/app.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="brand">
        <span class="brand-mark">◇</span>
        <div>
          <h1>LangOps</h1>
          <p class="subtitle">AI 智能化运维</p>
        </div>
      </div>
      <div class="header-actions">
        <span id="health-badge" class="badge badge-muted">检查中…</span>
        <a class="link" href="/docs" target="_blank" rel="noopener">API 文档</a>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="alerts" type="button">告警分析</button>
      <button class="tab" data-tab="query" type="button">自然语言查询</button>
      <button class="tab" data-tab="predict" type="button">容量预测</button>
      <button class="tab" data-tab="remediation" type="button">修复审批</button>
    </nav>

    <main>
      <section id="panel-alerts" class="panel active">
        <div class="panel-grid">
          <form id="alert-form" class="card">
            <h2>提交告警</h2>
            <p class="hint">填写告警信息，触发根因分析与修复建议。</p>

            <label>标题<input name="title" required value="CPU使用率过高" /></label>
            <label>描述<textarea name="description" rows="2" required>order-service Pod CPU 超过 90%</textarea></label>

            <div class="row">
              <label>严重程度
                <select name="severity">
                  <option value="critical" selected>严重</option>
                  <option value="high">高</option>
                  <option value="medium">中</option>
                  <option value="low">低</option>
                </select>
              </label>
              <label>类别
                <select name="category">
                  <option value="resource" selected>资源</option>
                  <option value="availability">可用性</option>
                  <option value="performance">性能</option>
                  <option value="security">安全</option>
                </select>
              </label>
            </div>

            <div class="row">
              <label>来源类型
                <select name="source_type">
                  <option value="kubernetes" selected>Kubernetes</option>
                  <option value="aliyun">阿里云</option>
                  <option value="prometheus">Prometheus</option>
                </select>
              </label>
              <label>系统/集群<input name="system" required value="prod-cluster" /></label>
            </div>

            <div class="row">
              <label>命名空间<input name="namespace" value="production" /></label>
              <label>Pod 名称<input name="pod_name" value="order-service-abc123" /></label>
            </div>

            <label>指标数据 (JSON)<textarea name="metric_data" rows="3">{"cpu_usage_percent": 95.5}</textarea></label>

            <button type="submit" class="btn primary">开始分析</button>
          </form>

          <div class="card result-card">
            <h2>分析结果</h2>
            <pre id="alert-result" class="result">等待提交…</pre>
          </div>
        </div>
      </section>

      <section id="panel-query" class="panel">
        <div class="panel-grid">
          <form id="query-form" class="card">
            <h2>NL2PromQL</h2>
            <p class="hint">用自然语言提问，系统自动生成 PromQL 并查询 Prometheus。</p>
            <label>问题<textarea name="query" rows="4" required placeholder="例如：过去1小时哪些 Pod CPU 使用率最高？">过去1小时哪些 Pod CPU 使用率最高？</textarea></label>
            <button type="submit" class="btn primary">查询</button>
          </form>

          <div class="card result-card">
            <h2>查询结果</h2>
            <pre id="query-result" class="result">等待查询…</pre>
          </div>
        </div>
      </section>

      <section id="panel-predict" class="panel">
        <div class="panel-grid">
          <form id="predict-form" class="card">
            <h2>容量预测</h2>
            <p class="hint">基于历史指标趋势，预测未来资源风险。</p>
            <div class="row">
              <label>命名空间<input name="namespace" value="production" required /></label>
              <label>Pod 名称<input name="pod_name" value="order-service-abc123" required /></label>
            </div>
            <div class="row">
              <label>集群<input name="system" value="prod-cluster" /></label>
              <label>预测窗口 (小时)<input name="horizon_hours" type="number" min="1" max="168" value="24" /></label>
            </div>
            <button type="submit" class="btn primary">开始预测</button>
          </form>
          <div class="card result-card">
            <h2>预测结果</h2>
            <pre id="predict-result" class="result">等待预测…</pre>
          </div>
        </div>
      </section>

      <section id="panel-remediation" class="panel">
        <div class="panel-grid">
          <div class="card">
            <h2>待审批计划</h2>
            <p class="hint">告警分析产生的修复建议会在此等待人工审批。默认 Dry-run，不执行真实命令。</p>
            <label>审批人<input id="remediation-user" value="ops-user" required /></label>
            <button id="remediation-refresh" type="button" class="btn primary">刷新列表</button>
            <ul id="remediation-list" class="plan-list" aria-label="待审批修复计划"></ul>
          </div>

          <div class="card result-card">
            <h2>计划详情</h2>
            <div id="remediation-actions" class="action-row" hidden>
              <button id="remediation-dry-run" type="button" class="btn secondary">Dry-run</button>
              <button id="remediation-reject" type="button" class="btn danger">拒绝</button>
            </div>
            <pre id="remediation-result" class="result">点击「刷新列表」加载待审批计划…</pre>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>LangOps v0.1.0</span>
      <span>Trace 请前往 Langfuse 查看</span>
    </footer>
  </div>
  <script src="/ui/static/js/app.js"></script>
</body>
</html>
